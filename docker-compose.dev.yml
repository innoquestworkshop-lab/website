services:
  web:
    container_name: innoquest-website-dev
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "8888:8888"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=8888
    command: sh -c "npm install && npm run dev -- --port 8888"
    restart: unless-stopped
